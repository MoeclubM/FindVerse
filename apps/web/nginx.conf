server {
  listen 3000;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=30s;

  root /usr/share/nginx/html;
  index index.html;

  location = /api/v1/search {
    set $query_api __FINDVERSE_QUERY_API_PROXY__;
    proxy_pass $query_api/v1/search$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/v1/suggest {
    set $query_api __FINDVERSE_QUERY_API_PROXY__;
    proxy_pass $query_api/v1/suggest$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/v1/developer/search {
    set $query_api __FINDVERSE_QUERY_API_PROXY__;
    proxy_pass $query_api/v1/developer/search$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /api/internal/crawlers/ {
    set $task_api __FINDVERSE_TASK_API_PROXY__;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $task_api$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    set $control_api __FINDVERSE_CONTROL_API_PROXY__;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $control_api$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
