name: Crawler Dev Artifact

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crawler-dev-artifact-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build-crawler-dev-artifact:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            suffix: x86_64
          - runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build crawler release binary
        run: cargo build --release -p findverse-crawler

      - name: Package crawler dev artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/findverse-crawler-linux-${{ matrix.suffix }}.tar.gz -C target/release findverse-crawler

      - name: Upload crawler dev artifact
        uses: actions/upload-artifact@v7
        with:
          name: findverse-crawler-linux-${{ matrix.suffix }}-dev
          path: dist/findverse-crawler-linux-${{ matrix.suffix }}.tar.gz
          retention-days: 14
