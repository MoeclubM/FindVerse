name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/_validate.yml

  build-crawler-dev-artifact:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build crawler release binary
        run: cargo build --release -p findverse-crawler

      - name: Package crawler dev artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/findverse-crawler-linux-x86_64.tar.gz -C target/release findverse-crawler

      - name: Upload crawler dev artifact
        uses: actions/upload-artifact@v7
        with:
          name: findverse-crawler-linux-x86_64-dev
          path: dist/findverse-crawler-linux-x86_64.tar.gz
          retention-days: 14

  docker-smoke-e2e:
    needs:
      - validate
      - build-crawler-dev-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FINDVERSE_LOCAL_ADMIN_USERNAME: admin
      FINDVERSE_LOCAL_ADMIN_PASSWORD: change-me
      FINDVERSE_CRAWLER_JOIN_KEY: change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install web dependencies
        run: npm ci

      - name: Download crawler dev artifact
        uses: actions/download-artifact@v7
        with:
          name: findverse-crawler-linux-x86_64-dev
          path: .ci-artifacts/crawler

      - name: Install crawler dev binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/findverse-crawler"
          tar -xzf .ci-artifacts/crawler/findverse-crawler-linux-x86_64.tar.gz -C "$RUNNER_TEMP/findverse-crawler"
          chmod +x "$RUNNER_TEMP/findverse-crawler/findverse-crawler"
          echo "$RUNNER_TEMP/findverse-crawler" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/findverse-crawler/findverse-crawler" --help >/dev/null

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start stack
        run: bash ./scripts/deploy-stack.sh --rebuild --with-crawler --crawler-join-key "$FINDVERSE_CRAWLER_JOIN_KEY"

      - name: Verify web proxy and crawler container
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:3000/api/readyz | jq -e '.status == "ready"' >/dev/null
          curl -fsS 'http://127.0.0.1:3000/api/v1/search?q=ranking' | jq -e '.results | length >= 1' >/dev/null

          admin_token="$(curl -fsS -X POST http://127.0.0.1:8080/v1/admin/session/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"change-me"}' | jq -r '.token')"

          if [[ -z "$admin_token" || "$admin_token" == "null" ]]; then
            echo "admin login failed while verifying crawler container" >&2
            exit 1
          fi

          for _ in $(seq 1 30); do
            overview="$(curl -fsS http://127.0.0.1:8080/v1/admin/crawl/overview -H "Authorization: Bearer $admin_token")"
            if echo "$overview" | jq -e '.crawlers | length >= 1' >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "crawler container did not register with control-api" >&2
          exit 1

      - name: Reset crawl queue for smoke worker
        shell: bash
        run: |
          set -euo pipefail
          docker compose stop crawler-worker

          admin_token="$(curl -fsS -X POST http://127.0.0.1:8080/v1/admin/session/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"change-me"}' | jq -r '.token')"

          if [[ -z "$admin_token" || "$admin_token" == "null" ]]; then
            echo "admin login failed while resetting crawl queue" >&2
            exit 1
          fi

          curl -fsS -X POST http://127.0.0.1:8080/v1/admin/crawl/jobs/stop \
            -H "Authorization: Bearer $admin_token" >/dev/null
          curl -fsS -X DELETE http://127.0.0.1:8080/v1/admin/crawl/jobs/completed \
            -H "Authorization: Bearer $admin_token" >/dev/null

      - name: Smoke test and Playwright
        run: bash ./scripts/smoke-test.sh --control-api-base-url http://127.0.0.1:8080 --query-api-base-url http://127.0.0.1:8081 --run-playwright

      - name: Capture Docker logs
        if: failure()
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-logs
          path: docker-compose.log

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
