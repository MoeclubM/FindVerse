name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/_validate.yml

  build-binaries:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: findverse-linux-x86_64.tar.gz
            artifact_name: binaries-linux-x86_64
            package_cmd: |
              mkdir -p dist
              tar -czf dist/findverse-linux-x86_64.tar.gz -C target/release findverse-control-api findverse-query-api findverse-crawler
          - os: windows-latest
            archive: findverse-windows-x86_64.zip
            artifact_name: binaries-windows-x86_64
            package_cmd: |
              New-Item -ItemType Directory -Path dist -Force | Out-Null
              Compress-Archive -Path `
                target/release/findverse-control-api.exe, `
                target/release/findverse-query-api.exe, `
                target/release/findverse-crawler.exe `
                -DestinationPath dist/findverse-windows-x86_64.zip -Force
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p findverse-control-api -p findverse-query-api -p findverse-crawler

      - name: Package binaries on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: ${{ matrix.package_cmd }}

      - name: Package binaries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.package_cmd }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive }}

  create-release:
    needs:
      - build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --repo "$GH_REPO" --clobber
          else
            gh release create "$tag" dist/* --repo "$GH_REPO" --generate-notes --title "$tag"
          fi
