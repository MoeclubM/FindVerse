openapi: 3.1.0
info:
  title: FindVerse API
  version: 0.2.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health probe
      responses:
        "200":
          description: OK
  /v1/search:
    get:
      summary: Search indexed documents
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
        - in: query
          name: lang
          schema:
            type: string
        - in: query
          name: site
          schema:
            type: string
        - in: query
          name: freshness
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
      responses:
        "200":
          description: Search results
  /v1/suggest:
    get:
      summary: Suggest query prefixes
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggestions
  /v1/developer/usage:
    get:
      summary: Read developer search API usage
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Usage summary
  /v1/developer/keys:
    post:
      summary: Create search API key
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Key created
  /v1/developer/keys/{id}:
    delete:
      summary: Revoke search API key
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Key revoked
  /v1/developer/crawl/overview:
    get:
      summary: Read crawler overview for the developer
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Crawl overview
  /v1/developer/crawlers:
    post:
      summary: Create crawler credential
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Crawler created
  /v1/developer/frontier/seed:
    post:
      summary: Add seed URLs into the crawl frontier
      parameters:
        - in: header
          name: x-developer-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                source:
                  type: string
      responses:
        "200":
          description: Frontier seeded
  /internal/crawlers/claim:
    post:
      summary: Claim crawl jobs
      parameters:
        - in: header
          name: x-crawler-id
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_jobs:
                  type: integer
      responses:
        "200":
          description: Claimed jobs
  /internal/crawlers/report:
    post:
      summary: Submit crawl results
      parameters:
        - in: header
          name: x-crawler-id
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Results accepted
