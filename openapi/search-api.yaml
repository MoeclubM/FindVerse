openapi: 3.1.0
info:
  title: FindVerse Split API
  version: 0.0.9
servers:
  - url: http://localhost:8081
    description: query-api
  - url: http://localhost:8080
    description: control-api
  - url: http://localhost:8082
    description: task-api

paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready or degraded

  /v1/search:
    get:
      summary: Public search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: lang
          schema:
            type: string
        - in: query
          name: site
          schema:
            type: string
        - in: query
          name: freshness
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
      responses:
        "200":
          description: Search results

  /v1/suggest:
    get:
      summary: Prefix suggestions
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggestions

  /v1/developer/search:
    get:
      summary: Developer API search
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results

  /v1/dev/register:
    post:
      summary: Register developer
      responses:
        "201":
          description: Developer session

  /v1/dev/login:
    post:
      summary: Developer login
      responses:
        "200":
          description: Developer session

  /v1/dev/me:
    get:
      summary: Current developer session
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Developer session

  /v1/dev/logout:
    post:
      summary: Developer logout
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Logged out

  /v1/dev/keys:
    get:
      summary: List current developer keys and daily usage
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Developer usage
    post:
      summary: Create developer key
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Key created

  /v1/dev/keys/{id}:
    delete:
      summary: Revoke developer key
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Key revoked

  /v1/admin/session/login:
    post:
      summary: Admin login
      responses:
        "200":
          description: Admin session

  /v1/admin/session/me:
    get:
      summary: Current admin session
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Admin session

  /v1/admin/session/logout:
    post:
      summary: Admin logout
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Logged out

  /v1/admin/developers:
    get:
      summary: List developer accounts
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Developer account list

  /v1/admin/developers/{user_id}:
    patch:
      summary: Update developer enabled state or daily quota
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Updated

  /v1/admin/developers/{user_id}/keys:
    get:
      summary: List developer keys
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Developer key list
    post:
      summary: Create developer key as admin
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Key created

  /v1/admin/developers/{user_id}/keys/{key_id}:
    delete:
      summary: Revoke developer key as admin
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
        - in: path
          name: key_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Key revoked

  /v1/admin/crawlers/{id}:
    patch:
      summary: Rename crawler worker
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Crawler updated
    delete:
      summary: Delete crawler worker
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Crawler deleted

  /v1/admin/frontier/seed:
    post:
      summary: Queue manual crawl seeds
      responses:
        "200":
          description: Frontier seeded

  /v1/admin/crawl/overview:
    get:
      summary: Crawl overview
      responses:
        "200":
          description: Overview data

  /v1/admin/crawl/rules:
    post:
      summary: Create crawl rule
      responses:
        "201":
          description: Rule created

  /v1/admin/crawl/rules/{id}:
    patch:
      summary: Update crawl rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rule updated
    delete:
      summary: Delete crawl rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Rule deleted

  /v1/admin/crawl/jobs:
    get:
      summary: List crawl jobs
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Job list

  /v1/admin/crawl/jobs/stats:
    get:
      summary: Job status counters
      responses:
        "200":
          description: Job stats

  /v1/admin/crawl/jobs/retry:
    post:
      summary: Retry failed and dead-letter jobs
      responses:
        "200":
          description: Retry count

  /v1/admin/crawl/jobs/completed:
    delete:
      summary: Cleanup succeeded jobs
      responses:
        "200":
          description: Cleanup count

  /v1/admin/documents:
    get:
      summary: List indexed documents
      responses:
        "200":
          description: Document list

  /v1/admin/documents/{id}:
    delete:
      summary: Delete one indexed document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /v1/admin/documents/purge-site:
    post:
      summary: Delete indexed documents by site
      responses:
        "200":
          description: Purge result

  /internal/crawlers/claim:
    post:
      summary: Claim crawl jobs on task-api
      parameters:
        - in: header
          name: x-crawler-id
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claimed jobs

  /internal/crawlers/report:
    post:
      summary: Report crawl results on task-api
      parameters:
        - in: header
          name: x-crawler-id
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report accepted

  /internal/crawlers/heartbeat:
    post:
      summary: Sync crawler runtime config on task-api
      parameters:
        - in: header
          name: x-crawler-id
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Heartbeat accepted
