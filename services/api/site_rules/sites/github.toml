id = "github"
priority = 100
default_action = "deny"

[match]
hosts = ["github.com"]

[render]
prefer_js = false

[discover]
sources = []

[[rules]]
name = "repo-root"
action = "allow_index_discover"
path_regex = "^/[^/]+/[^/]+/?$"

[[rules]]
name = "repo-readme"
action = "allow_index_only"
path_regex = "^/[^/]+/[^/]+/blob/.+?/README(\\.[A-Za-z0-9._-]+)?$"

[[rules]]
name = "repo-noise"
action = "deny"
path_regex = "^/[^/]+/[^/]+/(blob|tree|commit|commits|pull|issues|actions|releases|packages|security|wiki|network|graphs|compare|tags|branches|stargazers|watchers|forks|pulse|discussions)/"
