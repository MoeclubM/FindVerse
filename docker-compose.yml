services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: findverse
      POSTGRES_USER: findverse
      POSTGRES_PASSWORD: findverse
    ports:
      - "${FINDVERSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8.1
    restart: unless-stopped
    ports:
      - "${FINDVERSE_REDIS_PORT:-6379}:6379"

  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${FINDVERSE_OPENSEARCH_PORT:-9200}:9200"

  control-api:
    build:
      context: .
      dockerfile: services/control-api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - valkey
      - opensearch
    environment:
      FINDVERSE_CONTROL_API_BIND: 0.0.0.0:8080
      FINDVERSE_POSTGRES_URL: postgres://findverse:findverse@postgres:5432/findverse
      FINDVERSE_REDIS_URL: redis://valkey:6379/0
      FINDVERSE_OPENSEARCH_URL: http://opensearch:9200
      FINDVERSE_FRONTEND_ORIGIN: http://localhost:${FINDVERSE_WEB_PORT:-3000}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
      FINDVERSE_LOCAL_ADMIN_PASSWORD: ${FINDVERSE_LOCAL_ADMIN_PASSWORD:-change-me}
      FINDVERSE_CRAWLER_JOIN_KEY: ${FINDVERSE_CRAWLER_JOIN_KEY:-}
    ports:
      - "${FINDVERSE_CONTROL_API_PORT:-8080}:8080"

  query-api:
    build:
      context: .
      dockerfile: services/query-api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - valkey
      - opensearch
    environment:
      FINDVERSE_QUERY_API_BIND: 0.0.0.0:8081
      FINDVERSE_POSTGRES_URL: postgres://findverse:findverse@postgres:5432/findverse
      FINDVERSE_REDIS_URL: redis://valkey:6379/0
      FINDVERSE_OPENSEARCH_URL: http://opensearch:9200
      FINDVERSE_FRONTEND_ORIGIN: http://localhost:${FINDVERSE_WEB_PORT:-3000}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
      FINDVERSE_LOCAL_ADMIN_PASSWORD: ${FINDVERSE_LOCAL_ADMIN_PASSWORD:-change-me}
    ports:
      - "${FINDVERSE_QUERY_API_PORT:-8081}:8081"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        FINDVERSE_CONTROL_API_PROXY: http://control-api:8080
        FINDVERSE_QUERY_API_PROXY: http://query-api:8081
    restart: unless-stopped
    depends_on:
      - control-api
      - query-api
    ports:
      - "${FINDVERSE_WEB_PORT:-3000}:3000"

  crawler-worker:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    restart: unless-stopped
    profiles:
      - crawler
    depends_on:
      - control-api
    environment:
      FINDVERSE_CRAWLER_SERVER: ${FINDVERSE_CRAWLER_SERVER:-http://control-api:8080}
      FINDVERSE_CRAWLER_JOIN_KEY: ${FINDVERSE_CRAWLER_JOIN_KEY:-}
      FINDVERSE_CRAWLER_MAX_JOBS: ${FINDVERSE_CRAWLER_MAX_JOBS:-10}
      FINDVERSE_CRAWLER_POLL_INTERVAL_SECS: ${FINDVERSE_CRAWLER_POLL_INTERVAL_SECS:-5}
      FINDVERSE_CRAWLER_CONCURRENCY: ${FINDVERSE_CRAWLER_CONCURRENCY:-4}
      FINDVERSE_CRAWLER_ALLOWED_DOMAINS: ${FINDVERSE_CRAWLER_ALLOWED_DOMAINS:-}
      FINDVERSE_CRAWLER_PROXY: ${FINDVERSE_CRAWLER_PROXY:-}
    entrypoint:
      - /bin/sh
      - -lc
      - >
          set -- worker
          --server "$$FINDVERSE_CRAWLER_SERVER"
          --join-key "$$FINDVERSE_CRAWLER_JOIN_KEY"
          --max-jobs "$$FINDVERSE_CRAWLER_MAX_JOBS"
          --poll-interval-secs "$$FINDVERSE_CRAWLER_POLL_INTERVAL_SECS"
          --concurrency "$$FINDVERSE_CRAWLER_CONCURRENCY";
          if [ -n "$$FINDVERSE_CRAWLER_ALLOWED_DOMAINS" ]; then
          set -- "$$@" --allowed-domains "$$FINDVERSE_CRAWLER_ALLOWED_DOMAINS";
          fi;
          if [ -n "$$FINDVERSE_CRAWLER_PROXY" ]; then
          set -- "$$@" --proxy "$$FINDVERSE_CRAWLER_PROXY";
          fi;
          exec findverse-crawler "$$@"

volumes:
  postgres_data:
