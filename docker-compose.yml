x-rust-build-args: &rust-build-args
  FINDVERSE_CARGO_BUILD_JOBS: ${FINDVERSE_CARGO_BUILD_JOBS:-1}

x-control-plane-build: &control-plane-build
  context: .
  dockerfile: services/control-plane.Dockerfile
  args: *rust-build-args

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FINDVERSE_POSTGRES_DB:-findverse}
      POSTGRES_USER: ${FINDVERSE_POSTGRES_USER:-findverse}
      POSTGRES_PASSWORD: ${FINDVERSE_POSTGRES_PASSWORD:-findverse}
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${FINDVERSE_POSTGRES_USER:-findverse} -d ${FINDVERSE_POSTGRES_DB:-findverse}
      interval: 5s
      timeout: 5s
      retries: 12
    mem_limit: ${FINDVERSE_POSTGRES_MEM_LIMIT:-1g}

  valkey:
    image: valkey/valkey:8.1
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - "yes"
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    healthcheck:
      test:
        - CMD-SHELL
        - valkey-cli ping || redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 12
    mem_limit: ${FINDVERSE_VALKEY_MEM_LIMIT:-256m}

  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "${FINDVERSE_OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}"
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${FINDVERSE_OPENSEARCH_MEM_LIMIT:-2g}

  blob-storage:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-blob-storage:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: blob-storage-runner
    restart: unless-stopped
    environment:
      FINDVERSE_BLOB_STORAGE_BIND: ${FINDVERSE_BLOB_STORAGE_BIND:-0.0.0.0:8090}
      FINDVERSE_BLOB_STORE_DIR: ${FINDVERSE_BLOB_STORE_DIR:-/var/lib/findverse/blobs}
    volumes:
      - ./data/blobs:/var/lib/findverse/blobs
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:8090/readyz >/dev/null
      interval: 5s
      timeout: 5s
      retries: 12
    mem_limit: ${FINDVERSE_BLOB_STORAGE_MEM_LIMIT:-256m}

  bootstrap:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-bootstrap:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: bootstrap-runner
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_started
      blob-storage:
        condition: service_healthy
    environment:
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_OPENSEARCH_URL: ${FINDVERSE_OPENSEARCH_URL:-http://opensearch:9200}
      FINDVERSE_OPENSEARCH_INDEX: ${FINDVERSE_OPENSEARCH_INDEX:-findverse-documents}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_FRONTEND_ORIGIN: ${FINDVERSE_FRONTEND_ORIGIN:-http://localhost:${FINDVERSE_WEB_PORT:-3000}}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
      FINDVERSE_LOCAL_ADMIN_PASSWORD: ${FINDVERSE_LOCAL_ADMIN_PASSWORD:-change-me}
      FINDVERSE_BOOTSTRAP_ADMIN_ENABLED: ${FINDVERSE_BOOTSTRAP_ADMIN_ENABLED:-true}
      FINDVERSE_INDEX_PATH: ${FINDVERSE_INDEX_PATH:-/opt/findverse/production/empty-bootstrap-documents.json}
      FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS: ${FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS:-300}
    volumes:
      - ./config/production:/opt/findverse/production:ro

  control-api:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-control-api:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: control-api-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_started
      blob-storage:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      FINDVERSE_CONTROL_API_BIND: ${FINDVERSE_CONTROL_API_BIND:-0.0.0.0:8080}
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_OPENSEARCH_URL: ${FINDVERSE_OPENSEARCH_URL:-http://opensearch:9200}
      FINDVERSE_OPENSEARCH_INDEX: ${FINDVERSE_OPENSEARCH_INDEX:-findverse-documents}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_FRONTEND_ORIGIN: ${FINDVERSE_FRONTEND_ORIGIN:-http://localhost:${FINDVERSE_WEB_PORT:-3000}}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
      FINDVERSE_LOCAL_ADMIN_PASSWORD: ${FINDVERSE_LOCAL_ADMIN_PASSWORD:-change-me}
      FINDVERSE_BOOTSTRAP_ADMIN_ENABLED: "false"
      FINDVERSE_CRAWLER_MAINTENANCE_INTERVAL_SECS: ${FINDVERSE_CRAWLER_MAINTENANCE_INTERVAL_SECS:-15}
      FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS: ${FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS:-300}
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_CONTROL_API_PORT:-8080}:8080"
    mem_limit: ${FINDVERSE_CONTROL_API_MEM_LIMIT:-512m}

  query-api:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-query-api:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: query-api-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_started
      blob-storage:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      FINDVERSE_QUERY_API_BIND: ${FINDVERSE_QUERY_API_BIND:-0.0.0.0:8081}
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_OPENSEARCH_URL: ${FINDVERSE_OPENSEARCH_URL:-http://opensearch:9200}
      FINDVERSE_OPENSEARCH_INDEX: ${FINDVERSE_OPENSEARCH_INDEX:-findverse-documents}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_FRONTEND_ORIGIN: ${FINDVERSE_FRONTEND_ORIGIN:-http://localhost:${FINDVERSE_WEB_PORT:-3000}}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
      FINDVERSE_LOCAL_ADMIN_PASSWORD: ${FINDVERSE_LOCAL_ADMIN_PASSWORD:-change-me}
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_QUERY_API_PORT:-8081}:8081"
    mem_limit: ${FINDVERSE_QUERY_API_MEM_LIMIT:-512m}

  task-api:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-task-api:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: task-api-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      blob-storage:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      FINDVERSE_TASK_API_BIND: ${FINDVERSE_TASK_API_BIND:-0.0.0.0:8082}
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_LOCAL_ADMIN_USERNAME: ${FINDVERSE_LOCAL_ADMIN_USERNAME:-admin}
    ports:
      - "${FINDVERSE_INTERNAL_BIND_HOST:-0.0.0.0}:${FINDVERSE_TASK_API_PORT:-8082}:8082"
    mem_limit: ${FINDVERSE_TASK_API_MEM_LIMIT:-384m}

  scheduler:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-scheduler:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: scheduler-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      blob-storage:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_OPENSEARCH_URL: ${FINDVERSE_OPENSEARCH_URL:-http://opensearch:9200}
      FINDVERSE_OPENSEARCH_INDEX: ${FINDVERSE_OPENSEARCH_INDEX:-findverse-documents}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_CRAWLER_MAINTENANCE_INTERVAL_SECS: ${FINDVERSE_CRAWLER_MAINTENANCE_INTERVAL_SECS:-15}
      FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS: ${FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS:-300}
    mem_limit: ${FINDVERSE_SCHEDULER_MEM_LIMIT:-384m}

  projector:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-projector:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      <<: *control-plane-build
      target: projector-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_started
      blob-storage:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      FINDVERSE_POSTGRES_URL: ${FINDVERSE_POSTGRES_URL:-postgres://findverse:findverse@postgres:5432/findverse}
      FINDVERSE_POSTGRES_MAX_CONNECTIONS: ${FINDVERSE_POSTGRES_MAX_CONNECTIONS:-20}
      FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS: ${FINDVERSE_POSTGRES_ACQUIRE_TIMEOUT_SECS:-5}
      FINDVERSE_REDIS_URL: ${FINDVERSE_REDIS_URL:-redis://valkey:6379/0}
      FINDVERSE_OPENSEARCH_URL: ${FINDVERSE_OPENSEARCH_URL:-http://opensearch:9200}
      FINDVERSE_OPENSEARCH_INDEX: ${FINDVERSE_OPENSEARCH_INDEX:-findverse-documents}
      FINDVERSE_BLOB_STORAGE_URL: ${FINDVERSE_BLOB_STORAGE_URL:-http://blob-storage:8090}
      FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS: ${FINDVERSE_CRAWLER_CLAIM_TIMEOUT_SECS:-300}
      FINDVERSE_PROJECTOR_INTERVAL_SECS: ${FINDVERSE_PROJECTOR_INTERVAL_SECS:-2}
      FINDVERSE_PROJECTOR_BATCH_SIZE: ${FINDVERSE_PROJECTOR_BATCH_SIZE:-64}
    mem_limit: ${FINDVERSE_PROJECTOR_MEM_LIMIT:-384m}

  web:
    image: ${FINDVERSE_IMAGE_PREFIX:-findverse}/findverse-web:${FINDVERSE_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        FINDVERSE_CONTROL_API_PROXY: http://control-api:8080
        FINDVERSE_QUERY_API_PROXY: http://query-api:8081
        FINDVERSE_TASK_API_PROXY: http://task-api:8082
        FINDVERSE_SITE_NAME: ${FINDVERSE_SITE_NAME:-FindVerse}
    restart: unless-stopped
    depends_on:
      control-api:
        condition: service_started
      query-api:
        condition: service_started
      task-api:
        condition: service_started
    ports:
      - "${FINDVERSE_WEB_BIND_HOST:-0.0.0.0}:${FINDVERSE_WEB_PORT:-3000}:3000"
    mem_limit: ${FINDVERSE_WEB_MEM_LIMIT:-256m}
